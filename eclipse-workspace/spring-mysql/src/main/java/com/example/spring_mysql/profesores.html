<!DOCTYPE html>
<html lang="es">
<style>
    .menu { background: #333; text-align: center; margin: 20px auto; width: 600px; border-radius: 80px; }
    .menu ul { list-style: none; }
    .menu li { display: inline-block; }
    .menu a { color: white; padding: 15px 20px; display: block; text-decoration: none; border-radius: 80px;}
    .menu a:hover { background: #555; }
</style>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Profesores</title>
    <script>
        async function obtenerProfesores() {
            try {
                const response = await fetch('http://localhost:9090/api/profesores');
                if (!response.ok) throw new Error('Error en la solicitud: ' + response.statusText);
                const data = await response.json();
                document.getElementById('resultado').innerText = JSON.stringify(data, null, 2);
            } catch (error) {
                console.error('Error al obtener profesores:', error);
            }
        }

        async function obtenerProfesoresPorId() {
            const id = document.getElementById('profesoresId').value;
            try {
                const response = await fetch('http://localhost:9090/api/profesores/' + id);
                if (!response.ok) throw new Error('Error en la solicitud: ' + response.statusText);
                const data = await response.json();
                document.getElementById('resultado').innerText = JSON.stringify(data, null, 2);
            } catch (error) {
                console.error('Error al obtener profesores:', error);
            }
        }

        async function guardarProfesores() {
            const nombre = document.getElementById('nombre').value;
            const apellidos = document.getElementById('apellidos').value;
            const domicilio = document.getElementById('domicilio').value;
            const ciudad = document.getElementById('ciudad').value;
            const provincia = document.getElementById('provincia').value;
            const cp = document.getElementById('cp').value;
            const email = document.getElementById('email').value;


            try {
                const response = await fetch('http://localhost:9090/api/profesores', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ nombre, apellidos, domicilio, ciudad })
                });

                if (!response.ok) throw new Error('Error en la solicitud: ' + response.statusText);
                const data = await response.json();
                document.getElementById('resultado').innerText = 'Profesores guardado: ' + JSON.stringify(data, null, 2);
            } catch (error) {
                console.error('Error al guardar profesores:', error);
            }
        }

        async function eliminarProfesores() {
            const id = document.getElementById('profesoresIdEliminar').value;
            try {
                const response = await fetch('http://localhost:9090/api/profesores/' + id, {
                    method: 'DELETE'
                });

                if (!response.ok) throw new Error('Error en la solicitud: ' + response.statusText);
                document.getElementById('resultado').innerText = 'Profesores con ID ' + id + ' eliminado.';
            } catch (error) {
                console.error('Error al eliminar profesores:', error);
            }
        }
    </script>
</head>
<nav class="menu">
    <ul>
        <li><a href="alumno.html">👨‍🎓 Modo Alumno</a></li>
        <li><a href="profesores.html">👨‍🏫 Modo Profesor</a></li>
        <li><a href="cursos.html">📋 Modo Curso</a></li>
    </ul>
</nav>
<body>
    <h1>Gestión de Profesores</h1>

    <h2>Obtener todos los profesores</h2>
    <button onclick="obtenerProfesores()">Obtener Todos</button>

    <h2>Obtener un profesores por ID</h2>
    <input type="text" id="profesoresId" placeholder="ID del Profesores">
    <button onclick="obtenerProfesoresPorId()">Obtener Profesores</button>

    <h2>Guardar un nuevo profesores</h2>
    <form onsubmit="event.preventDefault(); guardarProfesores();">
        <label for="nombre">Nombre:</label><br>
        <input type="text" id="nombre" name="nombre"><br>
        <label for="apellidos">Apellidos:</label><br>
        <input type="text" id="apellidos" name="apellidos"><br>
        <label for="domicilio">Dirección:</label><br>
        <input type="text" id="domicilio" name="domicilio"><br>
        <label for="ciudad">Ciudad:</label><br>
        <input type="text" id="ciudad" name="ciudad"><br>
        <label for="provincia">Provincia:</label><br>
        <input type="text" id="provincia" name="provincia"><br>
        <label for="cp">CP:</label><br>
        <input type="text" id="cp" name="cp"><br>
        <label for="email">eMail:</label><br>
        <input type="text" id="email" name="email"><br>
        <input type="submit" value="Guardar Profesores">
    </form>

    <h2>Eliminar un profesores por ID</h2>
    <input type="text" id="profesoresIdEliminar" placeholder="ID del Profesores">
    <button onclick="eliminarProfesores()">Eliminar Profesores</button>

    <h2>Resultado</h2>
    <pre id="resultado"></pre>
</body>
</html>
